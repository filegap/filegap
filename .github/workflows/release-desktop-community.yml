name: Release Desktop Community

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for manual runs)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos-community:
    runs-on: macos-latest
    env:
      VITE_APP_DISTRIBUTION: github
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build desktop app (unsigned community build)
        working-directory: apps/desktop
        run: npm run tauri:build

      - name: Collect release artifacts
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          find apps/desktop/src-tauri/target/release/bundle -type f \
            \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \) \
            -exec cp {} release-artifacts/ \;
          ls -la release-artifacts

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-community-macos
          path: release-artifacts/*
          if-no-files-found: error

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag || '' }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate desktop app version matches release tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.release_tag.outputs.value }}"
          TAG_VERSION="${TAG#desktop-v}"
          APP_VERSION="$(jq -r '.version' apps/desktop/src-tauri/tauri.conf.json)"

          if [ "${TAG_VERSION}" != "${APP_VERSION}" ]; then
            echo "Tag version (${TAG_VERSION}) does not match desktop app version (${APP_VERSION}) in apps/desktop/src-tauri/tauri.conf.json."
            echo "Update the desktop app version before creating/publishing this tag."
            exit 1
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          generate_release_notes: true
          files: release-artifacts/*
          body: |
            Community desktop release (unsigned / non-notarized).

            Notes:
            - PDF processing remains local-only.
            - This channel is intended for community distribution until Apple Developer signing/notarization is enabled.

      - name: Prepare Homebrew Cask metadata
        id: cask_meta
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.release_tag.outputs.value }}"
          VERSION="${TAG#desktop-v}"
          DMG_PATH="$(find release-artifacts -maxdepth 1 -type f -name "*.dmg" | head -n 1)"

          if [ -z "${DMG_PATH}" ]; then
            echo "No .dmg artifact found in release-artifacts."
            exit 1
          fi

          DMG_FILE="$(basename "${DMG_PATH}")"
          DMG_FILE_URL="${DMG_FILE// /%20}"
          DMG_SHA256="$(shasum -a 256 "${DMG_PATH}" | awk '{print $1}')"

          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "dmg_file=${DMG_FILE}"
            echo "dmg_file_url=${DMG_FILE_URL}"
            echo "dmg_sha256=${DMG_SHA256}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap repository
        if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: filegap/homebrew-filegap
          token: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: tap

      - name: Create or update Casks/filegap-desktop.rb
        if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          CASK_PATH="tap/Casks/filegap-desktop.rb"
          mkdir -p "$(dirname "${CASK_PATH}")"

          cat > "${CASK_PATH}" <<CASK
          cask "filegap-desktop" do
            version "${{ steps.cask_meta.outputs.version }}"
            sha256 "${{ steps.cask_meta.outputs.dmg_sha256 }}"

            url "https://github.com/filegap/filegap/releases/download/desktop-v#{version}/${{ steps.cask_meta.outputs.dmg_file_url }}"
            name "Filegap Desktop"
            desc "Privacy-first local PDF desktop app"
            homepage "https://github.com/filegap/filegap"

            auto_updates false
            depends_on macos: ">= :ventura"

            app "Filegap Desktop.app"
          end
          CASK

      - name: Commit and push tap changes
        if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          if git -C tap diff --quiet; then
            echo "No tap changes to commit."
            exit 0
          fi

          git -C tap config user.name "filegap-bot"
          git -C tap config user.email "actions@github.com"
          git -C tap add Casks/filegap-desktop.rb
          git -C tap commit -m "chore(cask): bump filegap-desktop ${{ steps.cask_meta.outputs.tag }}"
          git -C tap push

      - name: Skip tap update when token is missing
        if: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN == '' }}
        shell: bash
        run: |
          echo "HOMEBREW_TAP_GITHUB_TOKEN is not set; skipping automatic Homebrew tap update."
